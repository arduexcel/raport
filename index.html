<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی کارگێڕی و وردبینی</title>
     <link rel="icon" type="image/png" href="https://arduexcel.github.io/img/arduecel.ico">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --primary: #2980b9; --danger: #e74c3c; --dark: #2c3e50; --success: #27ae60; --purple: #8e44ad; --audit: #16a085; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f3f5; margin: 0; padding: 20px; direction: rtl; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 35px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        input, select { padding: 12px; border: 2px solid #eee; border-radius: 10px; width: 100%; box-sizing: border-box; font-size: 15px; margin-bottom: 10px; outline: none; }
        
        .btn { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); }
        .btn-dark { background: var(--dark); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .btn-purple { background: var(--purple); }

        .deleted-row { background-color: #fceaea !important; }
        .deleted-row td { text-decoration: line-through; opacity: 0.6; color: #777; }
        .deleted-row .reason-cell { text-decoration: none !important; color: var(--danger); font-size: 13px; font-weight: bold; opacity: 1; }
        .deleted-row .no-print { text-decoration: none !important; opacity: 1; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; position: relative; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: #f8f9fa; color: var(--dark); }
        
        .top-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { padding: 15px; border-radius: 12px; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stat-card.blue { background: var(--primary); }
        .stat-card.dark { background: var(--dark); }
        .stat-label { font-size: 14px; opacity: 0.9; margin-bottom: 5px; }
        .stat-value { font-size: 22px; font-weight: bold; }

        .summary-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .stat-box { padding: 20px; border-radius: 12px; color: white; text-align: center; }
        .stat-total { background: var(--dark); }
        .stat-count { background: var(--primary); }

        .badge { padding: 4px 8px; border-radius: 4px; color: white; font-size: 12px; font-weight: bold; }
        .badge-admin { background: var(--purple); }
        .badge-audit { background: var(--audit); }
        .badge-acc { background: #f39c12; }
        .badge-staff { background: var(--success); }

        @media print { .no-print { display: none !important; } .admin-container { box-shadow: none; width: 100%; padding: 0; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color: var(--dark);">چوونەژوورەوە</h2>
        <input type="text" id="userInput" placeholder="ناوی بەکارهێنەر">
        <input type="password" id="passInput" placeholder="وشەی تێپەڕ">
        <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="login()">چوونەژوورەوە</button>
    </div>
</div>

<div class="admin-container" id="mainApp">
    <div class="header">
        <div>
            <h2 style="margin:0; color: var(--dark);">سیستەمی ڕاپۆرت و وردبینی</h2>
            <div id="userStatus" style="color: var(--primary); font-weight: bold; margin-top: 5px;"></div>
        </div>
        <div class="no-print">
            <button id="addCarBtn" class="btn btn-purple" style="display:none;" onclick="window.open('https://arduexcel.github.io/data-iin/', '_blank')">🚗 ئۆتۆمبێلی نوێ</button>
            <button id="adminOnlyBtn" class="btn btn-dark" style="display:none;" onclick="toggleModal(true)">👥 کارمەندان</button>
            <button class="btn btn-success" onclick="window.print()">🖨️ پڕینت</button>
            <button class="btn btn-danger" onclick="logout()">🚪 دەرچوون</button>
        </div>
    </div>

    <div class="top-stats no-print">
        <div class="stat-card blue">
            <span class="stat-label">کۆی وەسڵەکان (فلتەرکراو)</span>
            <span id="topTotalCount" class="stat-value">0</span>
        </div>
        <div class="stat-card dark">
            <span class="stat-label">کۆی داهاتی فلتەرکراو</span>
            <span id="topTotalMoney" class="stat-value">0 IQD</span>
        </div>
    </div>

    <div class="no-print" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f9f9f9; padding: 20px; border-radius: 12px; margin-bottom: 25px;">
        <div>
            <label style="font-weight: bold;">بەروار:</label>
            <input type="date" id="reportDate" onchange="fetchInvoices()">
        </div>
        <div>
            <label style="font-weight: bold;">هێڵ:</label>
            <select id="lineFilter" onchange="fetchInvoices()">
                <option value="">هەموو هێڵەکان</option>
                <option value="هەولێر">هەولێر</option>
                <option value="کەرکوک">کەرکوک</option>
                <option value="ڕانیە">ڕانیە</option>
                <option value="قەڵادزێ">قەڵادزێ</option>
                <option value="بغداد">بغداد</option>
                <option value="چەمچەماڵ">چەمچەماڵ</option>
                <option value="دووز">دووز</option>
                <option value="کۆیە">کۆیە</option>
                <option value="پارکینگ">پارکینگ</option>
            </select>
        </div>
        <div>
            <label style="font-weight: bold;">کارمەند:</label>
            <select id="empFilter" onchange="fetchInvoices()">
                <option value="">هەموو کارمەندەکان</option>
            </select>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ژ.وەسڵ</th>
                <th>کات</th>
                <th>کارمەند</th>
                <th>ژمارەی ئۆتۆمبێل</th>
                <th>جۆری ئۆتۆمبێل</th>
                <th>هێڵ</th>
                <th>نرخ (دینار)</th>
                <th>تێبینی سڕینەوە</th>
                <th class="no-print">کردار</th>
            </tr>
        </thead>
        <tbody id="invoiceBody"></tbody>
    </table>

    <div class="summary-container">
        <div class="stat-box stat-count">
            <div style="font-size: 14px; opacity: 0.9;">کۆی وەسڵەکان (چالاک)</div>
            <div id="totalCount" style="font-size: 24px; font-weight: bold;">0</div>
        </div>
        <div class="stat-box stat-total">
            <div style="font-size: 14px; opacity: 0.9;">کۆی داهاتی چالاک</div>
            <div id="totalMoney" style="font-size: 24px; font-weight: bold;">0 IQD</div>
        </div>
    </div>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 20px;">
            <h3>بەڕێوەبردنی بەکارهێنەران</h3>
            <button class="btn btn-danger" onclick="toggleModal(false)">X</button>
        </div>
        <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <input type="hidden" id="editUserId">
            <input type="text" id="newUserName" placeholder="ناو">
            <input type="text" id="newUserPass" placeholder="پاسۆرد">
            <select id="newUserRole">
                <option value="staff">کارمەندی وەسڵ بڕ</option>
                <option value="accounts">ژمێریار (بینین)</option>
                <option value="audit">وردبین (هەموو دەسەڵاتێک)</option>
                <option value="admin">بەڕێوەبەر (هەموو دەسەڵاتێک)</option>
            </select>
            <button id="saveUserBtn" class="btn btn-success" style="width:100%" onclick="saveUser()">تۆمارکردن</button>
        </div>
        <table style="font-size: 14px;">
            <thead><tr><th>ناو</th><th>پاسۆرد</th><th>دەسەڵات</th><th>کردار</th></tr></thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCuUstd-6d0E-EbmQipv2mWk-bA55ajpQ0",
        authDomain: "car-system-4594d.firebaseapp.com",
        projectId: "car-system-4594d",
        storageBucket: "car-system-4594d.firebasestorage.app",
        messagingSenderId: "719030469585",
        appId: "1:719030469585:web:7a23645b9e684b727dd6f0"
    };
    
    const config2 = { 
        apiKey: "AIzaSyAMI84_IuKUZVqc8ImMW7eahru20cTkjFM", 
        authDomain: "sysam-k.firebaseapp.com", 
        projectId: "sysam-k", 
        storageBucket: "sysam-k.firebasestorage.app", 
        messagingSenderId: "905972435434", 
        appId: "1:905972435434:web:2501e11240523f8368ca93" 
    };

    const app1 = firebase.initializeApp(firebaseConfig, "app1");
    const app2 = firebase.initializeApp(config2, "app2");
    
    const db1 = app1.firestore();
    const db2 = app2.firestore();

    let currentUser = null;

    window.onload = function() {
        const savedUser = localStorage.getItem('terminalAdminUser');
        if (savedUser && savedUser !== "null") {
            try {
                currentUser = JSON.parse(savedUser);
                startApp();
            } catch(e) {
                localStorage.removeItem('terminalAdminUser');
                showLogin();
            }
        } else {
            showLogin();
        }
    };

    function showLogin() {
        document.getElementById('login-overlay').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('userInput').value = "";
        document.getElementById('passInput').value = "";
    }

    async function login() {
        const user = document.getElementById('userInput').value.trim();
        const pass = document.getElementById('passInput').value;

        if (user === "admin" && pass === "0055") {
            currentUser = { name: "Admin Main", role: "admin" };
            localStorage.setItem('terminalAdminUser', JSON.stringify(currentUser));
            startApp();
            return;
        }

        try {
            const snap = await db1.collection("Employees").where("name", "==", user).where("password", "==", pass).get();
            if (!snap.empty) {
                currentUser = snap.docs[0].data();
                if (currentUser.role === 'staff') {
                    alert("تۆ دەسەڵاتی بینینی ئەم بەشەت نییە!");
                } else {
                    localStorage.setItem('terminalAdminUser', JSON.stringify(currentUser));
                    startApp();
                }
            } else { 
                alert("ناو یان پاسۆرد هەڵەیە!"); 
            }
        } catch(e) {
            alert("هەڵە لە پەیوەندی داتابەیس!");
        }
    }

   function logout() {
        if(confirm("دڵنیای لە دەرچوون؟")) {
            // 1. سڕینەوەی داتاکان لە ناو بیرگەی براوسەر
            localStorage.removeItem('terminalAdminUser');
            
            // 2. گۆڕینی بارودۆخی بەکارهێنەری ئێستا بۆ هیچ
            currentUser = null;

            // 3. نیشاندانی لاپەڕەی لۆگین و شاردنەوەی ئەپەکە
            document.getElementById('login-overlay').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
            
            // 4. پاککردنەوەی خانەکانی ناو و پاسۆرد
            document.getElementById('userInput').value = "";
            document.getElementById('passInput').value = "";

            // 5. ڕیفرێشکردنی لاپەڕەکە بۆ دڵنیایی تەواو
            window.location.reload();
        }
    }
    function startApp() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        
        let displayRole = currentUser.role === 'admin' ? "بەڕێوەبەر" : (currentUser.role === 'audit' ? "وردبین" : "ژمێریار");
        document.getElementById('userStatus').innerText = `بەخێرهاتی: ${currentUser.name} (${displayRole})`;
        document.getElementById('reportDate').valueAsDate = new Date();

        if (currentUser.role === 'admin' || currentUser.role === 'audit') {
            document.getElementById('adminOnlyBtn').style.display = 'inline-flex';
            document.getElementById('addCarBtn').style.display = 'inline-flex';
            loadUsersList();
        } else {
            document.getElementById('adminOnlyBtn').style.display = 'none';
            document.getElementById('addCarBtn').style.display = 'none';
        }

        loadEmployees();
        fetchInvoices();
    }

    async function loadEmployees() {
        const empSelect = document.getElementById('empFilter');
        const snap = await db1.collection("Employees").where("role", "==", "staff").get();
        empSelect.innerHTML = '<option value="">هەموو کارمەندەکان</option>';
        snap.forEach(doc => {
            empSelect.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
        });
    }

    async function fetchInvoices() {
        const date = document.getElementById('reportDate').value;
        const lineVal = document.getElementById('lineFilter').value;
        const empVal = document.getElementById('empFilter').value;
        
        if (!date) return;

        const snap = await db1.collection("Invoices").doc(date).collection("AllInvoices").orderBy("invoiceNo", "asc").get();
        
        const tbody = document.getElementById('invoiceBody');
        tbody.innerHTML = "";
        let totalMoney = 0; let count = 0;

        snap.forEach(doc => {
            const inv = doc.data();
            const invId = doc.id;
            if ((lineVal === "" || inv.line === lineVal) && (empVal === "" || inv.employee === empVal)) {
                const isDeleted = (inv.status === 'deleted' || inv.status === 'canceled');
                if (!isDeleted) {
                    count++;
                    totalMoney += parseInt(inv.price) || 0;
                }

                let rowClass = isDeleted ? "deleted-row" : "";
                let actionBtn = "";
                
                if (isDeleted) {
                    if (currentUser.role === 'admin' || currentUser.role === 'audit') {
                        actionBtn = `<button class="btn btn-success no-print" style="padding:5px 10px; font-size:12px;" onclick="restoreInvoice('${invId}', '${date}')">گەڕاندنەوە</button>`;
                    } else {
                        actionBtn = `<span style="font-size:12px; color:gray;">سڕاوەتەوە</span>`;
                    }
                } else {
                    if (currentUser.role === 'admin' || currentUser.role === 'audit') {
                        actionBtn = `<button class="btn btn-danger no-print" style="padding:5px 10px; font-size:12px;" onclick="softDeleteInvoice('${invId}', '${inv.carNumber}', '${date}')">سڕینەوە</button>`;
                    }
                }

                tbody.innerHTML += `<tr class="${rowClass}">
                    <td>${inv.invoiceNo || '---'}</td>
                    <td>${inv.date ? (inv.date.includes(' ') ? inv.date.split(' ')[1] : inv.date) : '---'}</td>
                    <td>${inv.employee}</td>
                    <td><b>${inv.carNumber}</b></td>
                    <td>${inv.type || "نادیار"}</td>
                    <td>${inv.line}</td>
                    <td>${parseInt(inv.price).toLocaleString()} IQD</td>
                    <td class="reason-cell">${inv.deleteReason || ""}</td>
                    <td class="no-print">${actionBtn}</td>
                </tr>`;
            }
        });
        
        document.getElementById('totalCount').innerText = count;
        document.getElementById('totalMoney').innerText = totalMoney.toLocaleString() + " IQD";
        document.getElementById('topTotalCount').innerText = count;
        document.getElementById('topTotalMoney').innerText = totalMoney.toLocaleString() + " IQD";
    }

    async function softDeleteInvoice(id, carNum, date) {
        const reason = prompt(`هۆکاری سڕینەوەی وەسڵی (${carNum}) بنووسە:`);
        if (!reason) return;

        try {
            await db1.collection("Invoices").doc(date).collection("AllInvoices").doc(id).update({
                status: 'deleted',
                deleteReason: reason,
                deletedBy: currentUser.name,
                deletedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db2.collection("Invoices").doc(date).collection("AllInvoices").doc(id).delete();
            fetchInvoices();
        } catch (e) { alert("هەڵە لە سڕینەوە"); }
    }

    async function restoreInvoice(id, date) {
        if(!confirm("دڵنیای لە گەڕاندنەوەی ئەم وەسڵە؟")) return;

        try {
            const docRef = db1.collection("Invoices").doc(date).collection("AllInvoices").doc(id);
            const docSnap = await docRef.get();
            const invData = docSnap.data();

            await docRef.update({
                status: 'active',
                deleteReason: firebase.firestore.FieldValue.delete(),
                deletedBy: firebase.firestore.FieldValue.delete(),
                deletedAt: firebase.firestore.FieldValue.delete()
            });

            const cleanData = {...invData};
            cleanData.status = 'active';
            delete cleanData.deleteReason;
            delete cleanData.deletedBy;
            delete cleanData.deletedAt;

            await db2.collection("Invoices").doc(date).collection("AllInvoices").doc(id).set(cleanData);
            alert("گەڕایەوە");
            fetchInvoices();
        } catch (e) { alert("هەڵە لە گەڕاندنەوە"); }
    }

    function toggleModal(s) { 
        document.getElementById('userModal').style.display = s ? 'flex' : 'none'; 
        if(!s) clearUserForm();
    }

    function clearUserForm() {
        document.getElementById('editUserId').value = "";
        document.getElementById('newUserName').value = "";
        document.getElementById('newUserPass').value = "";
        document.getElementById('newUserRole').value = "staff";
        document.getElementById('saveUserBtn').innerText = "تۆمارکردن";
        document.getElementById('saveUserBtn').className = "btn btn-success";
    }

    async function saveUser() {
        const id = document.getElementById('editUserId').value;
        const n = document.getElementById('newUserName').value.trim();
        const p = document.getElementById('newUserPass').value.trim();
        const r = document.getElementById('newUserRole').value;

        if(!n || !p) return alert("تکایە خانەکان پڕ بکەرەوە");

        const userData = { name: n, password: p, role: r };

        try {
            if(id) {
                await db1.collection("Employees").doc(id).update(userData);
                alert("بە سەرکەوتوویی نوێکرایەوە");
            } else {
                userData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                await db1.collection("Employees").add(userData);
                alert("بە سەرکەوتوویی تۆمارکرا");
            }
            clearUserForm();
            loadEmployees();
        } catch (e) { alert("هەڵەیەک ڕوویدا!"); }
    }

    function editUser(id, name, pass, role) {
        document.getElementById('editUserId').value = id;
        document.getElementById('newUserName').value = name;
        document.getElementById('newUserPass').value = pass;
        document.getElementById('newUserRole').value = role;
        document.getElementById('saveUserBtn').innerText = "نوێکردنەوە";
        document.getElementById('saveUserBtn').className = "btn btn-primary";
    }
    
    function loadUsersList() {
        db1.collection("Employees").orderBy("role").onSnapshot(snap => {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                const uid = doc.id;
                let rClass = u.role === 'admin' ? "badge-admin" : (u.role === 'audit' ? "badge-audit" : (u.role === 'accounts' ? "badge-acc" : "badge-staff"));
                tbody.innerHTML += `<tr>
                    <td>${u.name}</td><td>${u.password}</td>
                    <td><span class="badge ${rClass}">${u.role}</span></td>
                    <td>
                        <button onclick="editUser('${uid}', '${u.name}', '${u.password}', '${u.role}')" style="color:blue;border:none;background:none;cursor:pointer;margin-left:10px;">دەستکاری</button>
                        <button onclick="deleteUser('${uid}')" style="color:red;border:none;background:none;cursor:pointer;">سڕینەوە</button>
                    </td>
                </tr>`;
            });
        });
    }

    async function deleteUser(id) {
        if(confirm("دڵنیای لە سڕینەوە؟")) {
            await db1.collection("Employees").doc(id).delete();
            loadEmployees();
        }
    }
</script>
</body>
</html>
